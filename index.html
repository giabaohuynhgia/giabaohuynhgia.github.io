<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HienThuyFood</title>
    <style>
        
        body {
            font-family: Arial, sans-serif;
            background-color: #f9f9f9;
        }
        h1 {
            color: #333;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        
        .product {
            background-color: #fff;
            border: 1px solid #ddd;
            padding: 20px;
            margin-bottom: 20px;
        }
        .product img {
            max-width: 100%;
            height: auto;
        }
        .product h2 {
            font-size: 1.5rem;
            margin-bottom: 10px;
        }
        .product p {
            font-size: 1rem;
            color: #777;
        }
        .buy-button {
            background-color: #ff6600;
            color: #fff;
            padding: 10px 20px;
            border: none;
            cursor: pointer;
            font-size: 1rem;
        }
        .buy-button:hover {
            background-color: #e65c00;
        }
        .address {
            background-color: #007bff;
            color: #fff;
            padding: 10px;
            margin-top: 20px;
            text-align: center;
            font-size: 1.2rem;
        }
        .sdt{
            background-color: #007bff;
            color: #fff;
            padding: 10px;
            margin-top: 20px;
            text-align: center;
            font-size: 1.2rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 style="color: blueviolet;">Hiền Thủy Food</h1>
        <div class="product">
            <img src="https://i.ex-cdn.com/nongnghiep.vn/files/bao_in/2020/11/11/122675421_975696799597971_1823060493574479171_n-0845_20201111_931-102208.jpeg" alt="Bánh đúc lá dứa ">
            <h2>Bánh đúc lá dứa</h2>
            <p>Giá: 100.000 VND</p>
            <button class="buy-button">Mua ngay</button>
        </div>
        <div class="product">
            <img src="https://www.btaskee.com/wp-content/uploads/2021/08/Sam-bo-luong.jpg" alt="Sâm bổ lượng">
            <h2>Sâm bổ lượng</h2>
            <p>Giá: 10.000 VND</p>
            <button class="buy-button">Mua ngay</button>
        </div>
       
    </div>
    <div class="sdt">
        <p>Liên hệ sđt <p style="color: #12cc50;">0913391484</p> hoặc zalo(cùng số) để đặt mua!
    <div class="address">
        <p>Địa chỉ: chợ Long Thành, Long Hậu, Lai Vung - Đồng Tháp</p>
    </div>
    <footer>
        <p style="text-align: center;">&copy; 2024 huynhgiabao</p>
    </footer>
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            var buyButtons = document.querySelectorAll('.buy-button');
            
            buyButtons.forEach(function (button) {
                button.addEventListener('click', function () {
                    alert('Chức năng mua vẫn chưa được hoàn thiện. Bạn thông cảm.');
                });
            });
        });
    </script>
</body>
</html>
